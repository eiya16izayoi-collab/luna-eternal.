<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUMBER REACH SOLO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const { useState, useEffect, useRef } = React;

        const getFirebaseInstance = () => {
            let config = {};
            try {
                config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            } catch (e) {
                console.error("Config parse error:", e);
            }
            if (!config.apiKey) return { auth: null, db: null, appId: 'default-id' };
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'number-reach-solo-v1';
            return { auth, db, appId };
        };

        const { auth, db, appId } = getFirebaseInstance();

        const Icon = ({ name, className = "" }) => {
            const icons = {
                user: <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
                target: (
                    <React.Fragment>
                        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
                    </React.Fragment>
                ),
                play: <polygon points="5 3 19 12 5 21 5 3"/>,
                send: (
                    <React.Fragment>
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </React.Fragment>
                ),
                rotate: (
                    <React.Fragment>
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </React.Fragment>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [roomName, setRoomName] = useState('');
            const [userName, setUserName] = useState('');
            const [isJoined, setIsJoined] = useState(false);
            const [gameState, setGameState] = useState(null);
            const [inputVal, setInputVal] = useState('');
            const [currentOp, setCurrentOp] = useState('mul');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await signInWithCustomToken(auth, token);
                        else await signInAnonymously(auth);
                    } catch (err) { console.error("Auth Error", err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!db || !user || !isJoined || !roomName) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomName);
                const unsubscribe = onSnapshot(roomRef, (snapshot) => {
                    if (snapshot.exists()) {
                        setGameState(snapshot.data());
                    }
                }, (err) => {
                    setError("データの同期に失敗しました。");
                });
                return () => unsubscribe();
            }, [user, isJoined, roomName]);

            const generateTarget = () => {
                const isPrime = (n) => {
                    for(let i=2, s=Math.sqrt(n); i<=s; i++) if(n % i === 0) return false;
                    return n > 1;
                };
                let t;
                do { t = Math.floor(Math.random() * 90000) + 10000; } while (isPrime(t));
                return t;
            };

            const handleJoin = async () => {
                if (!auth || !db) return setError("接続エラー");
                if (!userName.trim() || !roomName.trim()) return setError("入力を確認してください");
                setLoading(true);
                try {
                    const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomName);
                    const snap = await getDoc(roomRef);
                    if (!snap.exists()) {
                        await setDoc(roomRef, {
                            target: generateTarget(),
                            current: 1, turn: 1, maxTurns: 100,
                            players: [{ id: user.uid, name: userName }],
                            turnIndex: 0, status: 'waiting',
                            history: [`${userName}がルームを作成しました`],
                            lastInput: null, winner: null, hostId: user.uid
                        });
                    } else {
                        const data = snap.data();
                        if (!data.players.find(p => p.id === user.uid)) {
                            await updateDoc(roomRef, {
                                players: [...data.players, { id: user.uid, name: userName }],
                                history: [...data.history, `${userName}が入室しました`]
                            });
                        }
                    }
                    setIsJoined(true);
                } catch (err) { setError("入室失敗"); }
                setLoading(false);
            };

            const handleStart = async () => {
                if (!gameState) return;
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomName);
                await updateDoc(roomRef, { status: 'playing', history: [...gameState.history, "ゲーム開始！ターゲットを目指しましょう"] });
            };

            const processMove = async (val, op, actorName) => {
                if (!gameState) return;

                let next = op === 'mul' ? gameState.current * val : gameState.current / val;
                next = Math.round(next * 1000) / 1000;
                let status = 'playing';
                let winner = null;
                const history = [...gameState.history, `${actorName}: ${op==='mul'?'×':'÷'}${val} → ${next.toLocaleString()}`];

                if (next > gameState.target + 0.001) {
                    status = 'finished'; winner = "バースト！ターゲットを超えてしまいました。";
                } else if (Math.abs(next - gameState.target) < 0.01) {
                    status = 'finished'; winner = `おめでとうございます！ターゲット達成！ (${gameState.turn}ターン)`;
                } else if (gameState.turn >= gameState.maxTurns) {
                    status = 'finished'; winner = "ターン切れ（100ターン経過）";
                }

                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomName);
                await updateDoc(roomRef, {
                    current: next,
                    turn: gameState.turn + 1,
                    turnIndex: (gameState.turnIndex + 1) % gameState.players.length,
                    status,
                    history: history.slice(-15),
                    lastInput: val,
                    winner
                });
            };

            const handleAction = async () => {
                if (!user || gameState?.status !== 'playing') return;
                const val = parseFloat(inputVal);
                if (isNaN(val) || val <= 0 || val > 100) return setError("1〜100を入力してください");
                if (val === 1 && gameState.lastInput === 1) return setError("1を連続で使うことはできません");
                await processMove(val, currentOp, userName);
                setInputVal('');
            };

            const handleReset = async () => {
                const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomName);
                await updateDoc(roomRef, {
                    target: generateTarget(),
                    current: 1, turn: 1, turnIndex: 0, status: 'playing',
                    history: ["リスタート！"], lastInput: null, winner: null
                });
            };

            if (!isJoined) {
                return (
                    <div className="flex items-center justify-center min-h-screen p-4">
                        <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                            <h1 className="text-4xl font-black text-center bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent mb-8 italic uppercase tracking-tighter">Number Reach Solo</h1>
                            <div className="space-y-6">
                                <input type="text" value={userName} onChange={e => setUserName(e.target.value)} placeholder="あなたの名前" className="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-4 text-center font-bold text-white outline-none focus:ring-2 focus:ring-cyan-500" />
                                <input type="text" value={roomName} onChange={e => setRoomName(e.target.value)} placeholder="ルーム名（合言葉）" className="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-4 text-center font-bold text-white outline-none focus:ring-2 focus:ring-cyan-500" />
                                {error && <p className="text-red-400 text-xs text-center">{error}</p>}
                                <button onClick={handleJoin} disabled={loading || !user} className="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-bold transition-all shadow-lg active:scale-95 disabled:opacity-50 text-white">開始準備</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!gameState) return <div className="flex items-center justify-center min-h-screen font-bold animate-pulse text-cyan-500 tracking-widest">CONNECTING...</div>;

            const isMyTurn = gameState.status === 'playing' && gameState.players[gameState.turnIndex]?.id === user.uid;

            return (
                <div className="p-4 md:p-8 flex flex-col items-center max-w-4xl mx-auto">
                    <div className="flex flex-wrap gap-2 mb-8 justify-center">
                        {gameState.players.map((p, i) => (
                            <div key={p.id} className={`flex items-center gap-2 px-4 py-2 rounded-full border text-xs font-bold transition-all ${gameState.turnIndex === i && gameState.status === 'playing' ? 'bg-cyan-500 border-cyan-400 text-white scale-105 shadow-lg' : 'bg-slate-900 border-slate-800 text-slate-500'}`}>
                                <Icon name="user" className="w-3 h-3" /> {p.name}
                            </div>
                        ))}
                    </div>

                    <div className="w-full grid md:grid-cols-2 gap-4 mb-8">
                        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center shadow-inner">
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Target</p>
                            <p className="text-4xl font-black text-cyan-400 font-mono tracking-tighter">{gameState.target.toLocaleString()}</p>
                        </div>
                        <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 text-center shadow-inner">
                            <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Current</p>
                            <p className="text-4xl font-black text-emerald-400 font-mono tracking-tighter">{gameState.current.toLocaleString()}</p>
                        </div>
                    </div>

                    <div className="w-full max-w-md">
                        {gameState.status === 'waiting' ? (
                            <div className="text-center p-8 bg-slate-900 border border-slate-800 rounded-3xl shadow-xl space-y-6">
                                <div>
                                    <h2 className="text-slate-400 font-bold tracking-widest text-sm mb-1 uppercase">Solo Mode</h2>
                                    <p className="text-xs text-slate-500">×と÷を駆使してターゲットの数字をピッタリ目指そう！</p>
                                </div>
                                <button onClick={handleStart} className="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg active:scale-95 text-white transition-all">
                                    <Icon name="play" /> ゲーム開始
                                </button>
                            </div>
                        ) : gameState.status === 'playing' ? (
                            <div className={`space-y-4 ${!isMyTurn ? 'opacity-40 pointer-events-none' : ''}`}>
                                <div className="p-3 bg-slate-900 border border-slate-800 rounded-2xl text-center font-bold text-xs text-slate-400 flex items-center justify-center gap-2">
                                    <span className="text-cyan-500">Turn {gameState.turn}</span> / 100
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => setCurrentOp('mul')} className={`py-4 rounded-2xl font-black text-3xl border-b-4 transition-all ${currentOp === 'mul' ? 'bg-cyan-600 border-cyan-800 text-white' : 'bg-slate-800 border-slate-900 text-slate-600'}`}>×</button>
                                    <button onClick={() => setCurrentOp('div')} className={`py-4 rounded-2xl font-black text-3xl border-b-4 transition-all ${currentOp === 'div' ? 'bg-cyan-600 border-cyan-800 text-white' : 'bg-slate-800 border-slate-900 text-slate-600'}`}>÷</button>
                                </div>
                                <div className="flex gap-3">
                                    <input type="number" value={inputVal} onChange={e => setInputVal(e.target.value)} placeholder="1〜100" className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-4 py-4 outline-none font-bold text-2xl text-center shadow-inner text-white" />
                                    <button onClick={handleAction} className="bg-emerald-600 hover:bg-emerald-500 px-8 rounded-2xl flex items-center justify-center text-white active:scale-95 transition-all shadow-lg"><Icon name="send" /></button>
                                </div>
                                {error && <p className="text-red-400 text-xs text-center font-bold">{error}</p>}
                            </div>
                        ) : (
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center space-y-4 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-500"></div>
                                <h2 className="text-3xl font-black text-white italic tracking-tighter">FINISH!</h2>
                                <p className="font-bold text-slate-300">{gameState.winner}</p>
                                <button onClick={handleReset} className="w-full bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-slate-700 active:scale-95 transition-all text-white">
                                    <Icon name="rotate" /> もう一度挑戦
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="w-full max-w-lg mt-8 bg-slate-900/40 border border-slate-800 rounded-3xl p-6 h-48 flex flex-col backdrop-blur-sm">
                        <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest mb-3 text-center">Log History</p>
                        <div className="flex-1 overflow-y-auto space-y-2 text-[12px] font-mono text-slate-400 custom-scrollbar pr-2">
                            {gameState.history.slice().reverse().map((log, i) => (
                                <div key={i} className="border-l-2 border-slate-800 pl-4 py-1 bg-slate-800/20 rounded-r-xl">{log}</div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
